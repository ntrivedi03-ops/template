<!DOCTYPE html>
<html lang="en">
<head>
  <title>Registration Form</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="Home.css">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

 
</head>

<body>


<div class="container-fluid">  <div class=" row">
    <div class=""col-xs-12 col-sm-12 col-lg-12"" id="top1">Logo and  Basic </div>
  </div>
</div>
<nav class="navbar ">
  <div class="container-fluid">
    <div class="navbar-header">
      <a class="navbar-brand" href="#"></a>
    </div>

   <ul class="nav navbar-nav">
      <li class="active"><a href="Home.html">Home</a></li>

              
          <li><a href="#">Product</a></li>
          <li><a href="#">Cart</a></li>
          <li><a href="#">Contact</a></li>
    </ul>

    <ul class="nav navbar-nav navbar-right">
     
      <li><a href="Login.html"><span class="glyphicon glyphicon-log-in"></span> Login</a></li>
    </ul>
  </div>
</nav>

<div class="container-fluid">

  <!-- MAIN CONTENT ROW -->
  <div class="row">

    <div class="col-lg-2" id="left1">left</div>

    <div class="col-lg-8" id="mid1">

      <form>
        <fieldset>
          <legend>Registration Form</legend>

          <div class="form-group">
            <label>Name</label>
            <input type="text" class="form-control" placeholder="Name">
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" class="form-control" placeholder="Email">
          </div>

          <div class="form-group">
            <label>Mobile</label>
            <input type="tel" class="form-control" placeholder="Mobile Number">
          </div>

          <div class="form-group">
            <label>Address</label>
            <textarea class="form-control" placeholder="Address"></textarea>
          </div>

          <div class="form-group">
            <label>Gender</label><br>
            <label class="radio-inline"><input type="radio" name="gender"> Male</label>
            <label class="radio-inline"><input type="radio" name="gender"> Female</label>
          </div>

          <div class="form-group">
            <label>DOB</label>
            <input type="date" class="form-control">
          </div>

          <div class="form-group">
            <label>Hobbies</label><br>
            <label class="checkbox-inline"><input type="checkbox"> Reading</label>
            <label class="checkbox-inline"><input type="checkbox"> Gardening</label>
            <label class="checkbox-inline"><input type="checkbox"> Swimming</label>
          </div>

          <div class="form-group">
            <label>Select Subject</label>
            <select class="form-control">
              <option>Computer Application</option>
              <option>Computer Science</option>
            </select>
          </div>

          <div class="form-group">
            <label>File</label>
            <input type="file" class="form-control">
          </div>

          <div class="form-group">
            <label>Username</label>
            <input type="text" class="form-control">
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" class="form-control">
          </div>

        </fieldset>
      </form>

    </div>

    <div class="col-lg-2" id="right1">right</div>

  </div> <!-- ✅ row properly closed -->

  <!-- FOOTER -->
  <div class="row">
    <div class="col-lg-12" id="footer1">bottom</div>
  </div>

</div>

</body>
</html>
